<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Navy background with slight rounding -->
  <rect width="512" height="512" rx="48" fill="#1B2A4A"/>

  <!-- Gold accent stripe top -->
  <rect x="0" y="0" width="512" height="52" rx="48" fill="#D4A017"/>
  <rect x="0" y="20" width="512" height="32" fill="#D4A017"/>

  <!-- Gold accent stripe bottom -->
  <rect x="0" y="440" width="512" height="72" rx="48" fill="#D4A017"/>
  <rect x="0" y="440" width="512" height="32" fill="#D4A017"/>

  <!-- Thin cream inner border lines -->
  <rect x="24" y="72" width="464" height="3" fill="#F5F0E8" opacity="0.4"/>
  <rect x="24" y="437" width="464" height="3" fill="#F5F0E8" opacity="0.4"/>

  <!-- TD monogram -->
  <text
    x="256"
    y="360"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-4"
    fill="#F5F0E8"
  >TD</text>

  <!-- Rust dot accent centered on bottom stripe -->
  <circle cx="256" cy="471" r="14" fill="#B94A2C"/>

  <!-- Tiny dot row decorative -->
  <circle cx="222" cy="471" r="5" fill="#B94A2C" opacity="0.7"/>
  <circle cx="290" cy="471" r="5" fill="#B94A2C" opacity="0.7"/>
</svg>
