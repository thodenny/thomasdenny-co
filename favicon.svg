<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Ink background, gently rounded -->
  <rect width="512" height="512" rx="96" fill="#14171F"/>

  <!-- Brass hairline frame for refinement at larger sizes -->
  <rect x="36" y="36" width="440" height="440" rx="64"
        fill="none" stroke="#B89055" stroke-width="3" opacity="0.45"/>

  <!-- TD monogram: T in ivory, D italic in brass (mirrors the wordmark) -->
  <text x="256" y="365" text-anchor="middle"
        font-family="'Bodoni 72', Didot, 'Hoefler Text', Georgia, 'Times New Roman', serif"
        font-size="320" font-weight="500" fill="#ECE6DA"
        letter-spacing="-12">T<tspan fill="#B89055">D</tspan></text>

  <!-- Tiny brass rule beneath, editorial detail -->
  <rect x="226" y="412" width="60" height="2.5" fill="#B89055" opacity="0.7"/>
</svg>
