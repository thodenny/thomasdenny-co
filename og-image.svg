<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#1B2A4A"/>

  <!-- Subtle noise texture overlay (low opacity) -->
  <defs>
    <filter id="n">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" filter="url(#n)" opacity="0.06"/>

  <!-- Mustard top stripe -->
  <rect x="0" y="0" width="1200" height="14" fill="#D4A017"/>
  <!-- Mustard bottom stripe -->
  <rect x="0" y="616" width="1200" height="14" fill="#D4A017"/>

  <!-- Cream inner border lines -->
  <rect x="60" y="50" width="1080" height="2" fill="#F5F0E8" opacity="0.25"/>
  <rect x="60" y="578" width="1080" height="2" fill="#F5F0E8" opacity="0.25"/>

  <!-- Top label: AUSTIN, TEXAS -->
  <text x="600" y="115" text-anchor="middle"
    font-family="'Courier New', monospace" font-weight="700" font-size="20"
    letter-spacing="6" fill="#B94A2C">— AUSTIN · TEXAS —</text>

  <!-- Main wordmark: THOMAS / DENNY -->
  <text x="600" y="265" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-size="120"
    letter-spacing="-3" fill="#F5F0E8">THOMAS</text>
  <text x="600" y="385" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-weight="900" font-style="italic" font-size="120"
    letter-spacing="-3" fill="#D4A017">DENNY</text>

  <!-- Decorative double rule -->
  <rect x="450" y="425" width="300" height="2" fill="#F5F0E8" opacity="0.4"/>
  <rect x="450" y="433" width="300" height="2" fill="#F5F0E8" opacity="0.4"/>

  <!-- Tagline -->
  <text x="600" y="490" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="34"
    letter-spacing="3" fill="#F5F0E8">OPERATIONS &amp; AI · PROGRAM MANAGER AT META</text>

  <!-- Sub-tagline -->
  <text x="600" y="545" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-style="italic" font-size="24"
    fill="#F5F0E8" opacity="0.75">Ten years across Amazon, Tesla, and Meta.</text>

  <!-- URL footer -->
  <text x="600" y="600" text-anchor="middle"
    font-family="'Courier New', monospace" font-weight="700" font-size="18"
    letter-spacing="4" fill="#D4A017">thomasdenny.co</text>
</svg>
